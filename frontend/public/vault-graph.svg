<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8B5CF6;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="100" height="100" rx="20" fill="url(#bg)"/>
  <!-- Graph nodes -->
  <circle cx="30" cy="30" r="8" fill="#fff"/>
  <circle cx="70" cy="25" r="8" fill="#fff"/>
  <circle cx="50" cy="55" r="10" fill="#fff"/>
  <circle cx="25" cy="70" r="6" fill="#fff"/>
  <circle cx="75" cy="70" r="6" fill="#fff"/>
  <!-- Edges -->
  <line x1="30" y1="30" x2="70" y2="25" stroke="#fff" stroke-width="2" opacity="0.6"/>
  <line x1="30" y1="30" x2="50" y2="55" stroke="#fff" stroke-width="2" opacity="0.6"/>
  <line x1="70" y1="25" x2="50" y2="55" stroke="#fff" stroke-width="2" opacity="0.6"/>
  <line x1="50" y1="55" x2="25" y2="70" stroke="#fff" stroke-width="2" opacity="0.6"/>
  <line x1="50" y1="55" x2="75" y2="70" stroke="#fff" stroke-width="2" opacity="0.6"/>
</svg>
